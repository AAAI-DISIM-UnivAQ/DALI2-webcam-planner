<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start:   #0f0c29;
      --bg-mid:     #302b63;
      --bg-end:     #24243e;
      --card-bg:    rgba(255,255,255,0.07);
      --card-border:rgba(255,255,255,0.12);
      --card-hover: rgba(255,255,255,0.11);
      --text:       #f0f0f8;
      --text-dim:   #a0a0c0;
      --accent:     #7c6af7;
      --green:      #34d399;
      --yellow:     #fbbf24;
      --orange:     #f97316;
      --red:        #ef4444;
      --radius:     16px;
      --shadow:     0 8px 32px rgba(0,0,0,0.4);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      padding: 2rem 2rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid var(--card-border);
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.03);
    }
    .header-left h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-left h1 span { color: var(--accent); }
    .header-left p { color: var(--text-dim); font-size: 0.9rem; margin-top: 0.2rem; }
    .refresh-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 99px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      color: var(--text-dim);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    /* ── Plan section ────────────────────────────────────────────── */
    .plan-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(12px);
    }
    .plan-section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }
    .plan-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      list-style: none;
    }
    .plan-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(124,106,247,0.15);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 99px;
      padding: 0.4rem 0.9rem;
      font-size: 0.88rem;
    }
    .plan-rank {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Webcam grid ─────────────────────────────────────────────── */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* ── Webcam card ─────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      transition: transform 0.2s, background 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      background: var(--card-hover);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }
    .card-img-wrap img.loading { opacity: 0.3; }
    .no-image {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      color: var(--text-dim);
    }

    /* crowd colour strip on top of image */
    .crowd-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }

    .card-body { padding: 1.1rem 1.1rem 1.3rem; }

    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.7rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* crowd meter */
    .crowd-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.8rem;
    }
    .crowd-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      width: 50px;
    }
    .crowd-bar-bg {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .crowd-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }
    .crowd-value {
      font-size: 0.88rem;
      font-weight: 700;
      width: 28px;
      text-align: right;
    }

    /* description */
    .card-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 0.9rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* badges row */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 99px;
      padding: 0.2rem 0.6rem;
      font-size: 0.77rem;
      color: var(--text-dim);
    }

    /* updated-at */
    .card-footer {
      margin-top: 0.8rem;
      font-size: 0.73rem;
      color: rgba(160,160,192,0.6);
    }

    /* ── Loading / empty states ──────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
      font-size: 1rem;
    }
    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ──────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem;
      color: rgba(160,160,192,0.4);
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>&#127757; <span>{{ title }}</span></h1>
    <p>Folla in tempo reale analizzata da AI &middot; Aggiornamento automatico ogni 90 s</p>
  </div>
  <div class="refresh-badge">
    <span class="dot"></span>
    <span id="last-refresh">In caricamento&hellip;</span>
  </div>
</header>

<main>
  <!-- Optimal visit plan -->
  <section class="plan-section" id="plan-section" style="display:none">
    <h2>&#128205; Percorso consigliato (meno affollato prima)</h2>
    <ul class="plan-list" id="plan-list"></ul>
  </section>

  <!-- Webcam cards -->
  <div class="section-title">&#128247; Webcam live</div>
  <div id="grid-container">
    <div class="state-msg">
      <div class="spinner"></div><br>
      Connessione in corso&hellip;
    </div>
  </div>
</main>

<footer>
  Dati forniti da <strong>Windy Webcams API</strong> &middot; Analisi crowd via <strong>GPT-4o</strong> &middot; Agenti <strong>DALI2</strong>
</footer>

<script>
  // ── Helpers ────────────────────────────────────────────────────────

  const WEATHER_EMOJI = {
    sunny:   "☀️",
    cloudy:  "☁️",
    rainy:   "🌧️",
    foggy:   "🌫️",
    night:   "🌙",
    unknown: "❓",
  };

  const VIS_LABEL = { good: "Visibilità buona", moderate: "Visibilità media", poor: "Visibilità scarsa" };

  function crowdColor(level) {
    if (level < 0)  return "#6366f1";
    if (level <= 3) return "#34d399";   // green
    if (level <= 6) return "#fbbf24";   // yellow
    if (level <= 8) return "#f97316";   // orange
    return "#ef4444";                   // red
  }

  function crowdLabel(level) {
    if (level < 0)  return "—";
    if (level === 0) return "Deserto";
    if (level <= 2) return "Quasi vuoto";
    if (level <= 4) return "Poca gente";
    if (level <= 6) return "Moderato";
    if (level <= 8) return "Affollato";
    return "Strapieno";
  }

  function timeAgo(ts) {
    if (!ts) return "";
    const diff = Math.round((Date.now() / 1000) - ts);
    if (diff < 60)  return `${diff}s fa`;
    if (diff < 3600) return `${Math.round(diff/60)} min fa`;
    return `${Math.round(diff/3600)} h fa`;
  }

  // ── Render ─────────────────────────────────────────────────────────

  function renderPlan(webcams) {
    const section = document.getElementById("plan-section");
    const list = document.getElementById("plan-list");
    if (!webcams.length) { section.style.display = "none"; return; }
    section.style.display = "";
    list.innerHTML = webcams.map((cam, i) => `
      <li class="plan-item">
        <span class="plan-rank">${i + 1}</span>
        <span>${cam.name}</span>
        <span style="color:${crowdColor(cam.crowd_level)};font-weight:700;font-size:0.8rem">
          ${cam.crowd_level >= 0 ? cam.crowd_level + "/10" : "—"}
        </span>
      </li>`).join("");
  }

  function renderGrid(webcams) {
    const container = document.getElementById("grid-container");
    if (!webcams.length) {
      container.innerHTML = `<div class="state-msg">
        Nessun dato disponibile ancora.<br>
        <small>Il bridge effettuerà la prima scansione a breve.</small>
      </div>`;
      return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";

    webcams.forEach(cam => {
      const color = crowdColor(cam.crowd_level);
      const pct   = cam.crowd_level >= 0 ? (cam.crowd_level / 10) * 100 : 0;
      const we    = WEATHER_EMOJI[cam.weather] || "❓";
      const card  = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-img-wrap">
          <div class="crowd-strip" style="background:${color}"></div>
          ${cam.has_image
            ? `<img src="/api/image/${cam.id}" alt="${cam.name}" class="loading"
                    onload="this.classList.remove('loading')"
                    onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>📷</div>'">`
            : `<div class="no-image">📷</div>`}
        </div>
        <div class="card-body">
          <div class="card-name" title="${cam.name}">${cam.name}</div>
          <div class="crowd-row">
            <span class="crowd-label">Folla</span>
            <div class="crowd-bar-bg">
              <div class="crowd-bar" style="width:${pct}%;background:${color}"></div>
            </div>
            <span class="crowd-value" style="color:${color}">${cam.crowd_level >= 0 ? cam.crowd_level : "—"}</span>
          </div>
          <div class="card-desc" title="${cam.crowd_description}">
            ${cam.crowd_description || "&nbsp;"}
          </div>
          <div class="badges">
            <span class="badge">${we} ${cam.weather !== "unknown" ? cam.weather : "—"}</span>
            <span class="badge">👁 ${VIS_LABEL[cam.visibility] || cam.visibility}</span>
            <span class="badge">🏷 ${crowdLabel(cam.crowd_level)}</span>
            ${cam.lat ? `<span class="badge">📍 ${cam.lat.toFixed(3)}, ${cam.lon.toFixed(3)}</span>` : ""}
          </div>
          <div class="card-footer">Aggiornato ${timeAgo(cam.updated_at)}</div>
        </div>`;
      grid.appendChild(card);
    });

    container.innerHTML = "";
    container.appendChild(grid);
  }

  // ── Fetch & update ─────────────────────────────────────────────────

  async function refresh() {
    try {
      const resp = await fetch("/api/status");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      renderPlan(data.webcams);
      renderGrid(data.webcams);

      const d = new Date(data.timestamp * 1000);
      document.getElementById("last-refresh").textContent =
        `Aggiornato alle ${d.toLocaleTimeString("it-IT")}`;
    } catch (err) {
      document.getElementById("last-refresh").textContent = "Errore connessione";
      console.error(err);
    }
  }

  // Initial load + auto-refresh every 90 seconds
  refresh();
  setInterval(refresh, 90_000);
</script>
</body>
</html>
